<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinControl — Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#0f1117;
  --bg2:#161b26;
  --bg3:#1c2333;

  --text:#e8eaf0;
  --muted:#7a8096;

  --border:rgba(255,255,255,.07);

  --accent:#4f7cff;
  --accent2:#7b5cfa;

  --green:#22c55e;
  --red:#f43f5e;

  --radius:18px;

}

body{

  background:linear-gradient(135deg,#0f1117,#161b26);
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:'DM Sans',sans-serif;
  color:var(--text);

  overflow:hidden;

}

/* FUNDO */

.bg-effect{

  position:absolute;

  width:500px;
  height:500px;

  border-radius:50%;

  filter:blur(50px);

  z-index:0;

}

.bg1{

  top:-150px;
  left:-150px;

  background:rgba(79,124,255,.18);

}

.bg2{

  bottom:-150px;
  right:-150px;

  background:rgba(123,92,250,.18);

}

/* LOGIN */

.login-box{

  width:100%;
  max-width:430px;

  background:rgba(22,27,38,.95);

  border:1px solid var(--border);

  border-radius:30px;

  padding:42px;

  position:relative;
  z-index:1;

  backdrop-filter:blur(16px);

  box-shadow:0 20px 60px rgba(0,0,0,.5);

}

.logo{

  width:78px;
  height:78px;

  border-radius:24px;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  display:flex;
  align-items:center;
  justify-content:center;

  margin:0 auto 26px;

  font-size:34px;
  color:white;

}

.title{

  text-align:center;

  font-size:34px;
  font-weight:700;

  margin-bottom:10px;

}

.subtitle{

  text-align:center;

  color:var(--muted);

  line-height:1.6;

  margin-bottom:34px;

}

/* INPUTS */

.form-group{
  margin-bottom:20px;
}

.label{

  display:block;

  margin-bottom:10px;

  font-size:14px;
  font-weight:600;

}

.input-wrap{

  position:relative;

}

.input-wrap i{

  position:absolute;

  top:50%;
  left:16px;

  transform:translateY(-50%);

  color:var(--muted);

  font-size:18px;

}

.input{

  width:100%;
  height:58px;

  border:none;

  background:var(--bg3);

  border:1px solid var(--border);

  border-radius:16px;

  padding-left:50px;
  padding-right:16px;

  color:white;

  font-size:15px;

  transition:.2s;

}

.input:focus{

  outline:none;

  border-color:var(--accent);

  box-shadow:0 0 0 4px rgba(79,124,255,.15);

}

/* BOTÃO */

.login-btn{

  width:100%;
  height:58px;

  border:none;

  border-radius:16px;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  color:white;

  font-size:16px;
  font-weight:700;

  cursor:pointer;

  margin-top:8px;

  transition:.2s;

}

.login-btn:hover{

  transform:translateY(-2px);

  opacity:.95;

}

/* ALERTAS */

.error{

  display:none;

  margin-top:18px;

  background:rgba(244,63,94,.12);

  border:1px solid rgba(244,63,94,.2);

  color:var(--red);

  padding:14px;

  border-radius:14px;

  font-size:14px;

}

.success{

  display:none;

  margin-top:18px;

  background:rgba(34,197,94,.12);

  border:1px solid rgba(34,197,94,.2);

  color:var(--green);

  padding:14px;

  border-radius:14px;

  font-size:14px;

}

/* DEMO */

.demo{

  margin-top:26px;

  background:rgba(255,255,255,.03);

  border:1px solid var(--border);

  border-radius:18px;

  padding:18px;

}

.demo-title{

  font-size:12px;

  text-transform:uppercase;

  letter-spacing:.08em;

  color:var(--muted);

  margin-bottom:14px;

}

.demo-line{

  margin-bottom:10px;

  font-size:14px;

}

.footer{

  margin-top:30px;

  text-align:center;

  color:var(--muted);

  font-size:13px;

}

/* RESPONSIVO */

@media(max-width:500px){

  .login-box{

    margin:20px;
    padding:30px;

  }

  .title{
    font-size:28px;
  }

}

</style>

</head>

<body>

<div class="bg-effect bg1"></div>
<div class="bg-effect bg2"></div>

<div class="login-box">

<div class="logo">
<i class="ti ti-chart-pie-filled"></i>
</div>

<div class="title">
FinControl
</div>

<div class="subtitle">
Acesse seu painel financeiro inteligente
</div>

<form id="loginForm">

<div class="form-group">

<label class="label">
E-mail
</label>

<div class="input-wrap">

<i class="ti ti-mail"></i>

<input 
type="email" 
class="input" 
id="email"
placeholder="Digite seu e-mail"
required
>

</div>

</div>

<div class="form-group">

<label class="label">
Senha
</label>

<div class="input-wrap">

<i class="ti ti-lock"></i>

<input 
type="password" 
class="input" 
id="password"
placeholder="Digite sua senha"
required
>

</div>

</div>

<button type="submit" class="login-btn">
Entrar no Sistema
</button>

<div class="error" id="errorBox">
E-mail ou senha inválidos.
</div>

<div class="success" id="successBox">
Login realizado com sucesso! Redirecionando...
</div>

</form>

<div class="demo">

<div class="demo-title">
Credenciais de acesso
</div>

<div class="demo-line">
<strong>Login:</strong> daviguadagno30@gmail.com
</div>

<div class="demo-line">
<strong>Senha:</strong> Tiagodavi20@
</div>

</div>

<div class="footer">
FinControl © 2026 — Sistema Financeiro
</div>

</div>

<script>

const form = document.getElementById("loginForm");

const errorBox = document.getElementById("errorBox");

const successBox = document.getElementById("successBox");

form.addEventListener("submit", function(e){

  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  const validEmail = "daviguadagno30@gmail.com";

  const validPassword = "Tiagodavi20@";

  errorBox.style.display = "none";
  successBox.style.display = "none";

  if(email === validEmail && password === validPassword){

    successBox.style.display = "block";

    localStorage.setItem("fincontrol_logged","true");

    setTimeout(() => {

      window.location.href = "index.html";

    }, 1200);

  }else{

    errorBox.style.display = "block";

  }

});

</script>

</body>
</html>
