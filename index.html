<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08090c">
<title>FinanceFlow · Wealth OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..500&family=DM+Sans:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<style>
:root{
  --bg:#08090c;--bg2:#0b0c11;--panel:#0f1117;--panel2:#13151d;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.04);
  --txt:#eceae3;--muted:#8b8d98;--muted2:#5f616c;
  --gold:#d8c39c;--gold-b:#ecd6a8;--gold-d:rgba(216,195,156,.12);
  --pos:#5fc890;--pos-d:rgba(95,200,144,.13);
  --neg:#ec6a7e;--neg-d:rgba(236,106,126,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%,rgba(216,195,156,.05),transparent 60%),
             radial-gradient(900px 500px at -10% 10%,rgba(111,163,176,.04),transparent 55%),var(--bg);
  color:var(--txt);min-height:100vh;font-size:14px}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}
*::-webkit-scrollbar-track{background:transparent}
.serif{font-family:'Fraunces',serif}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.muted{color:var(--muted)}.muted2{color:var(--muted2)}
.gold{color:var(--gold-b)}.pos{color:var(--pos)}.neg{color:var(--neg)}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.ico-fill{font-variation-settings:'FILL' 1}

.shell{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;border-right:1px solid var(--line);
  padding:26px 16px;display:flex;flex-direction:column;gap:4px;
  background:linear-gradient(180deg,rgba(255,255,255,.012),transparent);
  position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 24px}
.brand-mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--gold),#9d8861);color:#1a160c;
  box-shadow:0 6px 22px rgba(216,195,156,.25);flex-shrink:0;font-size:20px}
.navitem{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;
  color:var(--muted);cursor:pointer;font-weight:500;transition:.18s;border:1px solid transparent;font-size:13.5px}
.navitem:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.navitem.active{color:#15130c;background:linear-gradient(135deg,var(--gold-b),var(--gold));
  border-color:rgba(216,195,156,.4);box-shadow:0 4px 18px rgba(216,195,156,.18);font-weight:600}
.nav-sep{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted2);
  padding:18px 14px 6px;font-weight:700}
.main{flex:1;min-width:0;padding:30px 38px 64px;max-width:1480px;margin:0 auto;width:100%}

.topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.h1{font-size:27px;font-weight:600;letter-spacing:-.3px}
.sub{color:var(--muted);font-size:13px;margin-top:3px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.018),rgba(255,255,255,.004));
  border:1px solid var(--line);border-radius:18px;padding:20px;position:relative;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,.1)}
.grid{display:grid;gap:16px}

.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.4px;font-weight:600}
.kpi-val{font-size:28px;font-weight:600;margin-top:9px;letter-spacing:-.6px}
.kpi-val.big{font-size:34px}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;
  padding:3px 8px;border-radius:99px;margin-top:11px}
.delta.up{color:var(--pos);background:var(--pos-d)}.delta.down{color:var(--neg);background:var(--neg-d)}
.kpi-ico{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:10px;
  display:grid;place-items:center;background:var(--gold-d);color:var(--gold-b);font-size:20px}

.sec-title{font-size:13px;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;gap:9px;margin-bottom:2px}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:16px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;font-weight:600;
  font-size:13px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.03);
  color:var(--txt);transition:.16s;font-family:inherit;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.06)}
.btn-primary{background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#15130c;border-color:transparent}
.btn-primary:hover{filter:brightness(1.07)}
.btn-sm{padding:7px 11px;font-size:12px}
.btn-icon{padding:8px;border-radius:9px}
.btn-danger:hover{background:var(--neg-d);color:var(--neg);border-color:rgba(236,106,126,.3)}

.tabs{display:inline-flex;background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:12px;padding:4px;gap:3px}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.tab.active{background:rgba(216,195,156,.14);color:var(--gold-b)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600;
  background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}
.badge.pos{background:var(--pos-d);color:var(--pos);border-color:transparent}
.badge.neg{background:var(--neg-d);color:var(--neg);border-color:transparent}
.badge.gold{background:var(--gold-d);color:var(--gold-b);border-color:transparent}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);
  font-weight:600;padding:11px 12px;border-bottom:1px solid var(--line)}
td{padding:13px 12px;border-bottom:1px solid var(--line2);font-size:13.5px}
tr.row:hover td{background:rgba(255,255,255,.018)}
.rowact{opacity:0;transition:.15s;display:flex;gap:4px;justify-content:flex-end}
tr.row:hover .rowact{opacity:1}

.modal-bg{position:fixed;inset:0;background:rgba(4,5,7,.72);backdrop-filter:blur(7px);
  display:grid;place-items:center;z-index:50;padding:20px;animation:fade .2s}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;width:100%;max-width:500px;
  padding:26px;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .22s}
@keyframes fade{from{opacity:0}} @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}}
.field{margin-bottom:15px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.input,.select{width:100%;padding:11px 13px;border-radius:11px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:.15s}
.input:focus,.select:focus{border-color:rgba(216,195,156,.5);background:rgba(216,195,156,.05)}
.select{appearance:none;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.dot{width:9px;height:9px;border-radius:99px;display:inline-block;flex-shrink:0}
.cat-dot{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty-ic{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.03);
  display:grid;place-items:center;margin:0 auto 14px;color:var(--muted2);font-size:28px}
.bar-track{height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.chip{font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--muted)}
.logo-circle{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;color:#fff;font-size:20px}
.logo-sm{width:28px;height:28px;border-radius:8px;font-size:15px}
.color-opt{width:30px;height:30px;border-radius:9px;cursor:pointer;border:2.5px solid transparent;transition:.12s}
.color-opt.sel{border-color:#fff;transform:scale(1.1)}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.filter-chip{padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);transition:.15s}
.filter-chip:hover{color:var(--txt)}.filter-chip.active{background:var(--gold-d);color:var(--gold-b);border-color:rgba(216,195,156,.3)}
.alert-strip{display:flex;align-items:center;gap:10px;padding:11px 15px;border-radius:12px;
  background:var(--neg-d);border:1px solid rgba(236,106,126,.25);color:var(--neg);font-size:13px;font-weight:500;margin-bottom:6px}
.alert-strip.warn{background:rgba(216,180,100,.1);border-color:rgba(216,180,100,.25);color:#e3c378}

.loader{height:100vh;display:grid;place-items:center;color:var(--muted)}
.spin{width:30px;height:30px;border:2.5px solid var(--line);border-top-color:var(--gold);border-radius:99px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:880px){
  .sidebar{position:fixed;z-index:40;transform:translateX(-100%);transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .sidebar.open{transform:none}
  .main{padding:22px 18px 60px}
  .mobile-bar{display:flex !important}
  .row2{grid-template-columns:1fr}
}
.mobile-bar{display:none}
@media print{.sidebar,.no-print{display:none!important}.main{padding:0;max-width:100%}.card{break-inside:avoid}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ===========================================================================
   FinanceFlow · Wealth OS
   Single-file React + Firebase (GitHub Pages ready)
   =========================================================================== */

const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ═══════════════════════════ FIREBASE CONFIG ═══════════════════════════ */
// ⚠️ PREENCHA COM OS DADOS DO SEU PROJETO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBgIZ4YYlAwJK8m7OPsvZ_InXzA_LzBp0g",
  authDomain: "gestao-pessoal-davi.firebaseapp.com",
  projectId: "gestao-pessoal-davi",
  storageBucket: "gestao-pessoal-davi.firebasestorage.app",
  messagingSenderId: "213063877924",
  appId: "1:213063877924:web:694dc381057b0d2aca9fb1"
};

let db = null;
let authReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  firebase.auth().signInAnonymously().catch(e => console.warn("Auth:", e));
} catch(e) { console.warn("Firebase init failed:", e); }

/* ═══════════════════════════ HELPERS ═══════════════════════════ */
const BRL = new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"});
const fmt = n => BRL.format(isFinite(n)?n:0);
const fmtK = n => {const a=Math.abs(n);if(a>=1e6)return"R$ "+(n/1e6).toFixed(1).replace(".",",")+  "M";if(a>=1e3)return"R$ "+(n/1e3).toFixed(1).replace(".",",")+  "k";return fmt(n)};
const pct = n => (n>=0?"+":"")+(isFinite(n)?n.toFixed(1).replace(".",","):"0")+"%";
const num = v => {const n=parseFloat(String(v).replace(/\./g,"").replace(",","."));return isFinite(n)?n:0};
const todayISO = () => new Date().toISOString().slice(0,10);
const mKey = iso => (iso||todayISO()).slice(0,7);
const curMonth = () => todayISO().slice(0,7);
const addM = (key,n) => {const[y,m]=key.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.toISOString().slice(0,7)};
const mLabel = key => {const[y,m]=key.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("pt-BR",{month:"short"}).replace(".","")};
const fmtDate = iso => iso?new Date(iso+"T00:00").toLocaleDateString("pt-BR"):"—";
const daysUntilDay = day => {const now=new Date();let next=new Date(now.getFullYear(),now.getMonth(),day);if(next < now)next=new Date(now.getFullYear(),now.getMonth()+1,day);return Math.ceil((next-now)/864e5)};
const lastMonths = n => {const out=[];let k=curMonth();for(let i=0;i<n;i++){out.unshift(k);k=addM(k,-1)}return out};

const addMonthsDate = (iso,n) => {const d=new Date(iso+"T00:00");d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10)};

const CORES = ["#8a2be2","#d8c39c","#6fa3b0","#ec6a7e","#5fc890","#e3a857","#4a90d9","#d47ab8","#7fa886","#b08aa8","#f0a050","#60a0a0"];
const CHART_COLORS = ["#d8c39c","#7fa886","#6fa3b0","#b08aa8","#caa178","#8893b0","#e07878","#78c0e0"];
const ICON_LIST = ["wallet","account_balance","credit_card","savings","paid","storefront","work","home","account_balance_wallet","currency_exchange"];

/* ═══════════════════════════ FIRESTORE HOOKS ═══════════════════════════ */
function useCollection(name) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!db) { setLoading(false); return; }
    const unsub = db.collection(name).onSnapshot(
      snap => { setDocs(snap.docs.map(d => ({id:d.id,...d.data()}))); setLoading(false); },
      err => { console.error(name, err); setLoading(false); }
    );
    return () => unsub();
  }, [name]);
  return [docs, loading];
}

function useConfig() {
  const [cfg, setCfg] = useState({saldoInicial:0});
  useEffect(() => {
    if (!db) return;
    return db.collection("config").doc("main").onSnapshot(snap => {
      if (snap.exists) setCfg(snap.data());
    });
  }, []);
  return cfg;
}

async function saveDoc(col, data) {
  if (!db) return;
  if (data.id) { const {id,...rest}=data; await db.collection(col).doc(id).set(rest,{merge:true}); }
  else { await db.collection(col).add(data); }
}
async function removeDoc(col, id) { if(db) await db.collection(col).doc(id).delete(); }
async function saveConfig(data) { if(db) await db.collection("config").doc("main").set(data,{merge:true}); }

/* ═══════════════════════════ CALCS ═══════════════════════════ */
function fiiCalc(f){const inv=f.cotas*f.precoMedio;const atual=f.cotas*(f.precoAtual||f.precoMedio);const ganho=atual-inv+(f.dividendos||0);return{inv,atual,ganho,rent:inv?(ganho/inv)*100:0,div:f.dividendos||0}}
function rfCalc(r){const dias=Math.max(0,(new Date()-new Date(r.dataAplicacao))/864e5);const juros=r.valorInvestido*(Math.pow(1+r.taxa/100,dias/365)-1);return{inv:r.valorInvestido,juros,atual:r.valorInvestido+juros,rent:r.valorInvestido?(juros/r.valorInvestido)*100:0}}
function cartaoCalc(card,compras,ref=curMonth()){const cs=compras.filter(c=>c.cartaoId===card.id);const faturas={};let usado=0;cs.forEach(c=>{const vp=c.valorTotal/c.parcelas;for(let i=0;i<c.parcelas;i++){const mk=addM(mKey(c.dataCompra),i);faturas[mk]=(faturas[mk]||0)+vp;if(mk>=ref)usado+=vp}});return{faturas,usado,disp:card.limite-usado,faturaAtual:faturas[ref]||0,perc:card.limite?(usado/card.limite)*100:0}}

/* ═══════════════════════════ UI ATOMS ═══════════════════════════ */
const I = ({n,s=18,c=""}) => <span className={"material-symbols-rounded "+c} style={{fontSize:s}}>{n}</span>;

function ChartCanvas({type,data,options,height=250}){
  const ref=useRef(null); const chart=useRef(null);
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    const ctx=ref.current?.getContext("2d");
    if(!ctx)return;
    chart.current=new Chart(ctx,{type,data,options:{...options,responsive:true,maintainAspectRatio:false,
      plugins:{...options?.plugins,legend:{display:false}},
      scales:type==="doughnut"||type==="pie"?{}:{
        x:{grid:{color:"rgba(255,255,255,.05)"},ticks:{color:"#5f616c",font:{size:11}}},
        y:{grid:{color:"rgba(255,255,255,.05)"},ticks:{color:"#5f616c",font:{size:11},callback:v=>fmtK(v)}}
      }}});
    return()=>{if(chart.current)chart.current.destroy()};
  },[type,JSON.stringify(data)]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}

function KPI({label,value,icon,delta,sub,big}){return(
  <div className="card">
    <div className="kpi-ico"><I n={icon} s={20}/></div>
    <div className="kpi-label">{label}</div>
    <div className={"kpi-val num"+(big?" big":"")}>{value}</div>
    {delta!=null&&<div className={"delta "+(delta>=0?"up":"down")}><I n={delta>=0?"arrow_upward":"arrow_downward"} s={13}/>{pct(delta)}</div>}
    {sub&&<div className="muted" style={{fontSize:12,marginTop:delta!=null?8:11}}>{sub}</div>}
  </div>
)}

function Modal({title,sub,onClose,children,wide}){return(
  <div className="modal-bg" onClick={onClose}>
    <div className="modal" style={wide?{maxWidth:580}:{}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div><div className="serif" style={{fontSize:20}}>{title}</div>{sub&&<div className="muted" style={{fontSize:12,marginTop:3}}>{sub}</div>}</div>
        <div className="btn btn-icon" onClick={onClose}><I n="close" s={16}/></div>
      </div>{children}
    </div>
  </div>
)}

const Field=({label,children})=><div className="field"><label>{label}</label>{children}</div>;
const Empty=({icon,text})=><div className="empty"><div className="empty-ic"><I n={icon} s={28}/></div>{text}</div>;
const ContaLogo=({conta,sm})=><div className={"logo-circle"+(sm?" logo-sm":"")} style={{background:`linear-gradient(135deg,${conta?.cor||"#555"},${conta?.cor||"#555"}88)`}}><I n={conta?.icone||"wallet"} s={sm?14:20}/></div>;

/* ═══════════════════════════ DASHBOARD ═══════════════════════════ */
function Dashboard({lancamentos,contas,compras,fiis,rendaFixa,categorias,config}){
  const cm=curMonth();
  const receitas=lancamentos.filter(l=>l.tipo==="receita");
  const despesas=lancamentos.filter(l=>l.tipo==="despesa");
  const recMes=receitas.filter(r=>mKey(r.data)===cm).reduce((s,r)=>s+r.valor,0);
  const despMes=despesas.filter(r=>mKey(r.data)===cm).reduce((s,r)=>s+r.valor,0);
  const saldoDisp=(config.saldoInicial||0)+receitas.reduce((s,r)=>s+r.valor,0)-despesas.filter(x=>x.paga).reduce((s,r)=>s+r.valor,0);
  const invFII=fiis.reduce((s,f)=>s+fiiCalc(f).atual,0);
  const invRF=rendaFixa.reduce((s,r)=>s+rfCalc(r).atual,0);
  const invTotal=invFII+invRF;
  const patrimonio=saldoDisp+invTotal;
  const aPagar=despesas.filter(x=>!x.paga&&mKey(x.data)===cm);
  const totalAPagar=aPagar.reduce((s,x)=>s+x.valor,0);
  const taxaPoup=recMes?((recMes-despMes)/recMes)*100:0;

  const months=lastMonths(7);
  const evolData=months.map(m=>{const rec=receitas.filter(r=>mKey(r.data)<=m).reduce((s,r)=>s+r.valor,0);const desp=despesas.filter(r=>mKey(r.data)<=m).reduce((s,r)=>s+r.valor,0);return Math.round((config.saldoInicial||0)+rec-desp+invTotal)});
  const fluxoMonths=lastMonths(6);
  const fluxoRec=fluxoMonths.map(m=>receitas.filter(r=>mKey(r.data)===m).reduce((s,r)=>s+r.valor,0));
  const fluxoDesp=fluxoMonths.map(m=>despesas.filter(r=>mKey(r.data)===m).reduce((s,r)=>s+r.valor,0));

  const prevPat=evolData.length>1?evolData[evolData.length-2]:patrimonio;
  const deltaPat=prevPat?((patrimonio-prevPat)/prevPat)*100:0;

  const alertas=contas.filter(c=>c.tipo==="cartao").map(c=>({c,dias:daysUntilDay(c.vencimento),st:cartaoCalc(c,compras)})).filter(a=>a.dias<=7);

  return(<div>
    <div className="topbar"><div><div className="h1 serif">Visão Geral</div><div className="sub">Posição consolidada · {new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div></div><span className="badge gold"><I n="auto_awesome" s={13}/> Tempo real</span></div>

    {(alertas.length>0||aPagar.length>0)&&<div style={{marginBottom:22,display:"grid",gap:8}}>
      {alertas.map((a,i)=><div key={i} className="alert-strip warn"><I n="warning" s={16}/><span><b>{a.c.nome}</b> vence em {a.dias===0?"hoje":a.dias+" dia(s)"} · fatura {fmt(a.st.faturaAtual)}</span></div>)}
      {aPagar.length>0&&<div className="alert-strip"><I n="paid" s={16}/><span>{aPagar.length} conta(s) a pagar · total {fmt(totalAPagar)}</span></div>}
    </div>}

    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",marginBottom:16}}>
      <KPI label="Patrimônio Total" value={fmt(patrimonio)} icon="account_balance" delta={deltaPat} big/>
      <KPI label="Saldo Disponível" value={fmt(saldoDisp)} icon="wallet" sub="Caixa após contas pagas"/>
      <KPI label="Investimentos" value={fmt(invTotal)} icon="trending_up" sub={`FIIs ${fmtK(invFII)} · RF ${fmtK(invRF)}`}/>
      <KPI label="Taxa de Poupança" value={pct(taxaPoup).replace("+","")} icon="target" sub="Receita não gasta no mês"/>
    </div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",marginBottom:24}}>
      <KPI label="Receita do Mês" value={fmt(recMes)} icon="arrow_upward"/>
      <KPI label="Despesas do Mês" value={fmt(despMes)} icon="arrow_downward"/>
      <KPI label="Resultado" value={fmt(recMes-despMes)} icon="paid" delta={recMes?((recMes-despMes)/recMes)*100:0}/>
      <KPI label="Contas a Pagar" value={fmt(totalAPagar)} icon="calendar_today" sub={aPagar.length+" pendência(s)"}/>
    </div>

    <div className="grid" style={{gridTemplateColumns:"1.6fr 1fr",marginBottom:16}}>
      <div className="card">
        <div className="sec-title"><I n="trending_up" s={16} c="gold"/> Evolução Patrimonial</div><div className="sec-sub">Últimos 7 meses</div>
        <ChartCanvas type="line" height={250} data={{labels:months.map(mLabel),datasets:[{data:evolData,borderColor:"#ecd6a8",backgroundColor:"rgba(216,195,156,.12)",fill:true,tension:.4,pointRadius:0,pointHitRadius:10,borderWidth:2.5}]}} options={{plugins:{tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}}}}/>
      </div>
      <div className="card">
        <div className="sec-title"><I n="savings" s={16} c="gold"/> Alocação</div><div className="sec-sub">{fmt(invTotal)} aplicados</div>
        {invTotal>0?<ChartCanvas type="doughnut" height={200} data={{labels:["FIIs","Renda Fixa"],datasets:[{data:[Math.round(invFII),Math.round(invRF)],backgroundColor:["#d8c39c","#6fa3b0"],borderWidth:0,borderRadius:4}]}} options={{cutout:"68%",plugins:{tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}}}}/>:<Empty icon="savings" text="Sem investimentos"/>}
        <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:8}}>
          {[{n:"Fundos Imobiliários",v:invFII,c:"#d8c39c"},{n:"Renda Fixa",v:invRF,c:"#6fa3b0"}].filter(x=>x.v>0).map(a=><div key={a.n} style={{display:"flex",justifyContent:"space-between",fontSize:12.5}}><span style={{display:"flex",alignItems:"center",gap:8}}><span className="dot" style={{background:a.c}}/>{a.n}</span><span className="num" style={{fontWeight:600}}>{fmt(a.v)}</span></div>)}
        </div>
      </div>
    </div>

    <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      <div className="card">
        <div className="sec-title"><I n="swap_horiz" s={16} c="gold"/> Fluxo de Caixa</div><div className="sec-sub">Receitas × Despesas · 6 meses</div>
        <ChartCanvas type="bar" height={230} data={{labels:fluxoMonths.map(mLabel),datasets:[{label:"Receitas",data:fluxoRec,backgroundColor:"#5fc890",borderRadius:5,maxBarThickness:24},{label:"Despesas",data:fluxoDesp,backgroundColor:"#ec6a7e",borderRadius:5,maxBarThickness:24}]}} options={{plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+": "+fmt(ctx.raw)}}}}}/>
      </div>
      <div className="card">
        <div className="sec-title"><I n="calendar_today" s={16} c="gold"/> Contas a Pagar</div><div className="sec-sub">Pendências do mês</div>
        {aPagar.length?<div style={{display:"flex",flexDirection:"column",gap:2}}>{aPagar.slice(0,6).map(x=>{const cat=categorias.find(c=>c.id===x.categoriaId);return <div key={x.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid var(--line2)"}}><div><div style={{fontWeight:500}}>{x.descricao}</div><div className="muted" style={{fontSize:11.5}}>{cat?.nome||"—"} · vence {fmtDate(x.vencimento)}</div></div><span className="num neg" style={{fontWeight:600}}>{fmt(x.valor)}</span></div>})}</div>:<Empty icon="check_circle" text="Tudo pago!"/>}
      </div>
    </div>
  </div>);
}

/* ═══════════════════════════ LANÇAMENTOS ═══════════════════════════ */
function Lancamentos({lancamentos,categorias,contas}){
  const cm=curMonth();
  const[modal,setModal]=useState(null);
  const[q,setQ]=useState("");
  const[filtro,setFiltro]=useState("todos");

  const list=useMemo(()=>{
    let l=[...lancamentos];
    if(filtro==="receita")l=l.filter(x=>x.tipo==="receita");
    if(filtro==="despesa")l=l.filter(x=>x.tipo==="despesa");
    if(filtro==="apagar")l=l.filter(x=>x.tipo==="despesa"&&!x.paga);
    if(q)l=l.filter(x=>(x.descricao||"").toLowerCase().includes(q.toLowerCase()));
    return l.sort((a,b)=>(b.data||"").localeCompare(a.data||""));
  },[lancamentos,filtro,q]);

  const save=async item=>{
    if(item.parcelado&&!item.id){
      const n=parseInt(item.numParcelas)||1;
      const vp=item.valor;
      const baseVenc=item.vencimento||item.data;
      for(let i=0;i<n;i++){
        const venc=addMonthsDate(baseVenc,i);
        await saveDoc("lancamentos",{
          tipo:item.tipo,descricao:item.descricao+" ("+(i+1)+"/"+n+")",
          valor:vp,categoriaId:item.categoriaId,contaId:item.contaId,
          data:venc,vencimento:venc,fixaVariavel:item.fixaVariavel,
          recorrente:false,paga:false,
          parcelado:true,parcelaAtual:i+1,totalParcelas:n
        });
      }
      setModal(null);
    } else {
      await saveDoc("lancamentos",item);setModal(null);
    }
  };
  const del=id=>removeDoc("lancamentos",id);
  const togglePaga=x=>saveDoc("lancamentos",{...x,paga:!x.paga});

  const totalRec=lancamentos.filter(x=>x.tipo==="receita"&&mKey(x.data)===cm).reduce((s,x)=>s+x.valor,0);
  const totalDesp=lancamentos.filter(x=>x.tipo==="despesa"&&mKey(x.data)===cm).reduce((s,x)=>s+x.valor,0);
  const totalPend=lancamentos.filter(x=>x.tipo==="despesa"&&!x.paga).reduce((s,x)=>s+x.valor,0);

  return(<div>
    <div className="topbar"><div><div className="h1 serif">Lançamentos</div><div className="sub">Todas as movimentações financeiras</div></div>
      <button className="btn btn-primary no-print" onClick={()=>setModal({})}><I n="add" s={16}/> Novo lançamento</button></div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",marginBottom:20}}>
      <KPI label="Receitas do mês" value={fmt(totalRec)} icon="arrow_upward"/>
      <KPI label="Despesas do mês" value={fmt(totalDesp)} icon="arrow_downward"/>
      <KPI label="A pagar" value={fmt(totalPend)} icon="warning" sub="Pendências acumuladas"/>
    </div>
    <div className="filter-bar">
      {[["todos","Todos"],["receita","Receitas"],["despesa","Despesas"],["apagar","A pagar"]].map(([k,l])=><div key={k} className={"filter-chip"+(filtro===k?" active":"")} onClick={()=>setFiltro(k)}>{l}</div>)}
      <div style={{marginLeft:"auto",position:"relative"}}><I n="search" s={16} c="muted2" /><input className="input" style={{paddingLeft:12,width:200}} placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)}/></div>
    </div>
    <div className="card" style={{padding:0,overflow:"hidden"}}>
      {list.length?<table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Conta</th><th>Tipo</th><th>Status</th><th style={{textAlign:"right"}}>Valor</th><th></th></tr></thead>
        <tbody>{list.map(x=>{const cat=categorias.find(c=>c.id===x.categoriaId);const conta=contas.find(c=>c.id===x.contaId);const isRec=x.tipo==="receita";return(
          <tr className="row" key={x.id}>
            <td className="num muted">{fmtDate(x.data)}</td>
            <td style={{fontWeight:500}}>{x.descricao}{x.recorrente&&<span className="chip" style={{marginLeft:8}}>recorrente</span>}{x.parcelado&&<span className="chip" style={{marginLeft:8}}>{x.parcelaAtual}/{x.totalParcelas}</span>}</td>
            <td>{cat?<span style={{display:"flex",alignItems:"center",gap:7}}><span className="cat-dot" style={{background:cat.cor}}/>{cat.nome}</span>:"—"}</td>
            <td>{conta?<span style={{display:"flex",alignItems:"center",gap:8}}><ContaLogo conta={conta} sm/><span style={{fontSize:12.5}}>{conta.nome}</span></span>:"—"}</td>
            <td><span className={"badge "+(isRec?"pos":"neg")}>{isRec?"Receita":"Despesa"}{x.fixaVariavel==="fixa"?" · Fixa":" · Var."}</span></td>
            <td>{!isRec?<span className={"badge "+(x.paga?"pos":"neg")} style={{cursor:"pointer"}} onClick={()=>togglePaga(x)}>{x.paga?<><I n="check" s={12}/> Paga</>:<><I n="calendar_today" s={12}/> A pagar</>}</span>:"—"}</td>
            <td style={{textAlign:"right"}} className={"num "+(isRec?"pos":"neg")}><b>{isRec?"+":"−"}{fmt(x.valor)}</b></td>
            <td><div className="rowact no-print"><div className="btn btn-icon btn-sm" onClick={()=>setModal(x)}><I n="edit" s={14}/></div><div className="btn btn-icon btn-sm btn-danger" onClick={()=>del(x.id)}><I n="delete" s={14}/></div></div></td>
          </tr>)})}</tbody></table>:<Empty icon="swap_horiz" text="Nenhum lançamento."/>}
    </div>
    {modal&&<LancModal item={modal} categorias={categorias} contas={contas} onSave={save} onClose={()=>setModal(null)}/>}
  </div>);
}

function LancModal({item,categorias,contas,onSave,onClose}){
  const[f,setF]=useState({tipo:"despesa",descricao:"",valor:"",categoriaId:"",contaId:contas[0]?.id||"",data:todayISO(),fixaVariavel:"variavel",recorrente:false,paga:false,vencimento:todayISO(),parcelado:false,numParcelas:"2",...item});
  const ch=k=>e=>setF({...f,[k]:e.target.type==="checkbox"?e.target.checked:e.target.value});
  const cats=categorias.filter(c=>c.tipo===f.tipo||c.tipo==="ambos");
  const isEdit=!!item.id;
  const valorParcela=f.parcelado?num(f.valor):0;
  const totalParcelado=f.parcelado?valorParcela*(parseInt(f.numParcelas)||1):0;
  return(<Modal title={isEdit?"Editar lançamento":"Novo lançamento"} sub="Dados da movimentação" onClose={onClose} wide>
    <div className="row2" style={{marginBottom:16}}>{["receita","despesa"].map(t=><div key={t} className={"filter-chip"+(f.tipo===t?" active":"")} style={{textAlign:"center",flex:1,padding:"12px 0"}} onClick={()=>setF({...f,tipo:t,categoriaId:""})}><I n={t==="receita"?"arrow_upward":"arrow_downward"} s={14}/> {t==="receita"?"Receita":"Despesa"}</div>)}</div>
    <Field label="Descrição"><input className="input" value={f.descricao} onChange={ch("descricao")} placeholder="Ex: Salário, Mercado..." autoFocus/></Field>
    <div className="row2"><Field label="Categoria"><select className="select" value={f.categoriaId} onChange={ch("categoriaId")}><option value="">Selecione</option>{cats.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select></Field><Field label="Conta / Cartão"><select className="select" value={f.contaId} onChange={ch("contaId")}><option value="">Selecione</option>{contas.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select></Field></div>
    {!isEdit&&f.tipo==="despesa"&&<label style={{display:"flex",alignItems:"center",gap:9,fontSize:13,color:"var(--muted)",cursor:"pointer",margin:"4px 0 15px"}}><input type="checkbox" checked={f.parcelado} onChange={ch("parcelado")} style={{width:16,height:16,accentColor:"var(--gold)"}}/> Compra parcelada</label>}
    {f.parcelado&&!isEdit?<>
      <div className="row2">
        <Field label="Valor da parcela (R$)"><input className="input num" value={f.valor} onChange={ch("valor")} placeholder="0,00"/></Field>
        <Field label="Quantidade de parcelas"><input className="input num" type="number" min="2" max="48" value={f.numParcelas} onChange={ch("numParcelas")}/></Field>
      </div>
      <Field label="Vencimento da 1ª parcela"><input type="date" className="input" value={f.vencimento} onChange={ch("vencimento")}/></Field>
      {f.valor&&f.numParcelas&&<div className="alert-strip warn" style={{marginBottom:15}}><I n="receipt_long" s={16}/><span>{f.numParcelas}x de {fmt(num(f.valor))} = <b>total {fmt(totalParcelado)}</b> · vencimentos de {fmtDate(f.vencimento)} a {fmtDate(addMonthsDate(f.vencimento,(parseInt(f.numParcelas)||1)-1))}</span></div>}
    </>:<>
      <div className="row2"><Field label="Valor (R$)"><input className="input num" value={f.valor} onChange={ch("valor")} placeholder="0,00"/></Field><Field label="Data"><input type="date" className="input" value={f.data} onChange={ch("data")}/></Field></div>
      {f.tipo==="despesa"&&<Field label="Vencimento"><input type="date" className="input" value={f.vencimento||""} onChange={ch("vencimento")}/></Field>}
    </>}
    <div className="row2"><Field label="Fixa / Variável"><select className="select" value={f.fixaVariavel} onChange={ch("fixaVariavel")}><option value="fixa">Fixa</option><option value="variavel">Variável</option></select></Field>{f.tipo==="despesa"&&!f.parcelado&&<Field label="Status"><select className="select" value={f.paga?"1":"0"} onChange={e=>setF({...f,paga:e.target.value==="1"})}><option value="0">A pagar</option><option value="1">Paga</option></select></Field>}</div>
    {!f.parcelado&&<label style={{display:"flex",alignItems:"center",gap:9,fontSize:13,color:"var(--muted)",cursor:"pointer",margin:"4px 0 20px"}}><input type="checkbox" checked={f.recorrente} onChange={ch("recorrente")} style={{width:16,height:16,accentColor:"var(--gold)"}}/> Recorrente (mensal)</label>}
    <div style={{display:"flex",gap:10,marginTop:f.parcelado?16:0}}><button className="btn" style={{flex:1}} onClick={onClose}>Cancelar</button><button className="btn btn-primary" style={{flex:1}} onClick={()=>f.descricao&&f.valor&&onSave({...f,valor:num(f.valor)})}>{f.parcelado&&!isEdit?"Criar "+f.numParcelas+" parcelas":"Salvar"}</button></div>
  </Modal>);
}

/* ═══════════════════════════ CATEGORIAS ═══════════════════════════ */
function Categorias({categorias,lancamentos}){
  const[modal,setModal]=useState(null);
  const[filtro,setFiltro]=useState("todos");
  const list=categorias.filter(c=>filtro==="todos"||c.tipo===filtro);
  const save=async cat=>{await saveDoc("categorias",cat);setModal(null)};
  const del=id=>{if(lancamentos.some(l=>l.categoriaId===id)){setModal({warn:true});return}removeDoc("categorias",id)};

  return(<div>
    <div className="topbar"><div><div className="h1 serif">Categorias</div><div className="sub">Gerencie receitas e despesas</div></div><button className="btn btn-primary no-print" onClick={()=>setModal({})}><I n="add" s={16}/> Nova categoria</button></div>
    <div className="filter-bar">{[["todos","Todas"],["receita","Receitas"],["despesa","Despesas"]].map(([k,l])=><div key={k} className={"filter-chip"+(filtro===k?" active":"")} onClick={()=>setFiltro(k)}>{l}</div>)}<div className="muted" style={{marginLeft:"auto",fontSize:12}}>{list.length} categoria(s)</div></div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))"}}>
      {list.map(c=>{const count=lancamentos.filter(l=>l.categoriaId===c.id).length;const total=lancamentos.filter(l=>l.categoriaId===c.id).reduce((s,l)=>s+(l.tipo==="receita"?l.valor:-l.valor),0);return(
        <div className="card" key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:42,height:42,borderRadius:12,background:`${c.cor}22`,border:`1.5px solid ${c.cor}44`,display:"grid",placeItems:"center"}}><I n="label" s={18} c="gold"/></div><div><div style={{fontWeight:600,fontSize:15}}>{c.nome}</div><div className="muted" style={{fontSize:12}}>{c.tipo==="receita"?"Receita":"Despesa"} · {count} lançamento(s)</div></div></div>
          <div style={{display:"flex",gap:4}}><div className="btn btn-icon btn-sm" onClick={()=>setModal(c)}><I n="edit" s={13}/></div><div className="btn btn-icon btn-sm btn-danger" onClick={()=>del(c.id)}><I n="delete" s={13}/></div></div>
        </div>)})}
      {!list.length&&<div className="card"><Empty icon="label" text="Nenhuma categoria"/></div>}
    </div>
    {modal&&!modal.warn&&<CatModal item={modal} onSave={save} onClose={()=>setModal(null)}/>}
    {modal?.warn&&<Modal title="Não é possível excluir" onClose={()=>setModal(null)}><p className="muted">Categoria vinculada a lançamentos.</p><button className="btn btn-primary" style={{marginTop:12,width:"100%"}} onClick={()=>setModal(null)}>Entendi</button></Modal>}
  </div>);
}
function CatModal({item,onSave,onClose}){
  const[f,setF]=useState({nome:"",tipo:"despesa",cor:CORES[0],...item});
  return(<Modal title={item.id?"Editar":"Nova"+" categoria"} onClose={onClose}>
    <Field label="Nome"><input className="input" value={f.nome} onChange={e=>setF({...f,nome:e.target.value})} autoFocus/></Field>
    <Field label="Tipo"><select className="select" value={f.tipo} onChange={e=>setF({...f,tipo:e.target.value})}><option value="receita">Receita</option><option value="despesa">Despesa</option></select></Field>
    <Field label="Cor"><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{CORES.map(c=><div key={c} className={"color-opt"+(f.cor===c?" sel":"")} style={{background:c}} onClick={()=>setF({...f,cor:c})}/>)}</div></Field>
    <div style={{display:"flex",gap:10,marginTop:18}}><button className="btn" style={{flex:1}} onClick={onClose}>Cancelar</button><button className="btn btn-primary" style={{flex:1}} onClick={()=>f.nome&&onSave(f)}>Salvar</button></div>
  </Modal>);
}

/* ═══════════════════════════ CONTAS & CARTÕES ═══════════════════════════ */
function ContasCartoes({contas,compras,lancamentos,categorias}){
  const[modal,setModal]=useState(null);const[compraModal,setCompraModal]=useState(null);const[tab,setTab]=useState("contas");
  const cartoes=contas.filter(c=>c.tipo==="cartao");const contasBanco=contas.filter(c=>c.tipo==="conta");
  const save=async c=>{await saveDoc("contas",c);setModal(null)};
  const del=id=>{if(lancamentos.some(l=>l.contaId===id)||compras.some(c=>c.cartaoId===id)){setModal({warn:true});return}removeDoc("contas",id)};
  const saveCompra=async c=>{await saveDoc("compras",c);setCompraModal(null)};
  const delCompra=id=>removeDoc("compras",id);
  const totalLimite=cartoes.reduce((s,c)=>s+(c.limite||0),0);
  const totalUsado=cartoes.reduce((s,c)=>s+cartaoCalc(c,compras).usado,0);

  return(<div>
    <div className="topbar"><div><div className="h1 serif">Contas & Cartões</div><div className="sub">Contas bancárias e cartões de crédito</div></div><button className="btn btn-primary no-print" onClick={()=>setModal({tipo:tab==="cartoes"?"cartao":"conta"})}><I n="add" s={16}/> {tab==="cartoes"?"Novo cartão":"Nova conta"}</button></div>
    <div className="tabs" style={{marginBottom:20}}><div className={"tab"+(tab==="contas"?" active":"")} onClick={()=>setTab("contas")}>Contas ({contasBanco.length})</div><div className={"tab"+(tab==="cartoes"?" active":"")} onClick={()=>setTab("cartoes")}>Cartões ({cartoes.length})</div></div>
    {tab==="contas"?<div className="grid" style={{gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))"}}>
      {contasBanco.map(c=><div className="card" key={c.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",gap:12,alignItems:"center"}}><ContaLogo conta={c}/><div><div style={{fontWeight:600}}>{c.nome}</div><div className="muted" style={{fontSize:12}}>Conta bancária</div></div></div><div style={{display:"flex",gap:4}}><div className="btn btn-icon btn-sm" onClick={()=>setModal(c)}><I n="edit" s={13}/></div><div className="btn btn-icon btn-sm btn-danger" onClick={()=>del(c.id)}><I n="delete" s={13}/></div></div></div></div>)}
      {!contasBanco.length&&<div className="card"><Empty icon="wallet" text="Nenhuma conta."/></div>}
    </div>:<div>
      <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",marginBottom:20}}>
        <KPI label="Limite total" value={fmt(totalLimite)} icon="credit_card"/><KPI label="Utilizado" value={fmt(totalUsado)} icon="percent"/><KPI label="Disponível" value={fmt(totalLimite-totalUsado)} icon="wallet"/>
      </div>
      <div className="grid" style={{gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",marginBottom:24}}>

      {rendaFixa.length?<table><thead><tr><th>Aplicação</th><th>Tipo</th><th>Investido</th><th>Taxa</th><th>Juros</th><th>Valor</th><th>Vencimento</th><th style={{textAlign:"right"}}>Rent.</th><th></th></tr></thead>

/* ═══════════════════════════ RELATÓRIOS ═══════════════════════════ */
function Relatorios({lancamentos,categorias,fiis,rendaFixa}){
  const receitas=lancamentos.filter(l=>l.tipo==="receita");const despesas=lancamentos.filter(l=>l.tipo==="despesa");
  const months=lastMonths(6);
  const compRec=months.map(m=>receitas.filter(r=>mKey(r.data)===m).reduce((s,r)=>s+r.valor,0));
  const compDesp=months.map(m=>despesas.filter(r=>mKey(r.data)===m).reduce((s,r)=>s+r.valor,0));
  const compRes=months.map((m,i)=>compRec[i]-compDesp[i]);
  const porCat=useMemo(()=>{const map={};despesas.forEach(x=>{const cat=categorias.find(c=>c.id===x.categoriaId);const name=cat?.nome||"Outros";map[name]={value:(map[name]?.value||0)+x.valor,cor:cat?.cor||"#888"}});return Object.entries(map).map(([name,v])=>({name,...v})).sort((a,b)=>b.value-a.value)},[despesas,categorias]);
  const totalDesp=porCat.reduce((s,c)=>s+c.value,0);
  const perfInv=[...fiis.map(f=>({nome:f.ticker,rent:fiiCalc(f).rent,valor:fiiCalc(f).atual})),...rendaFixa.map(r=>({nome:r.nome,rent:rfCalc(r).rent,valor:rfCalc(r).atual}))].sort((a,b)=>b.rent-a.rent);

  const exportCSV=()=>{const rows=[["Tipo","Descrição","Categoria","Data","Valor"]];lancamentos.forEach(l=>{const cat=categorias.find(c=>c.id===l.categoriaId);rows.push([l.tipo==="receita"?"Receita":"Despesa",l.descricao,cat?.nome||"",l.data,l.tipo==="receita"?l.valor:-l.valor])});const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${c}"`).join(";")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));a.download="financeflow_"+todayISO()+".csv";a.click()};

  return(<div>
    <div className="topbar"><div><div className="h1 serif">Relatórios</div><div className="sub">Análises e comparativos</div></div><div style={{display:"flex",gap:9}} className="no-print"><button className="btn" onClick={exportCSV}><I n="download" s={15}/> CSV</button><button className="btn" onClick={()=>window.print()}><I n="print" s={15}/> PDF</button></div></div>
    <div className="card" style={{marginBottom:16}}>
      <div className="sec-title"><I n="bar_chart" s={16} c="gold"/> Comparativo Mensal</div><div className="sec-sub">Receitas, despesas e resultado</div>
      <ChartCanvas type="bar" height={280} data={{labels:months.map(mLabel),datasets:[{label:"Receitas",data:compRec,backgroundColor:"#5fc890",borderRadius:5,maxBarThickness:20},{label:"Despesas",data:compDesp,backgroundColor:"#ec6a7e",borderRadius:5,maxBarThickness:20},{label:"Resultado",data:compRes,backgroundColor:"#d8c39c",borderRadius:5,maxBarThickness:20}]}} options={{plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+": "+fmt(ctx.raw)}}}}}/>
    </div>
    <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      <div className="card">
        <div className="sec-title"><I n="filter_list" s={16} c="gold"/> Despesas por Categoria</div><div className="sec-sub">Total {fmt(totalDesp)}</div>
        {porCat.length?<div style={{display:"flex",flexDirection:"column",gap:13}}>{porCat.slice(0,8).map(c=><div key={c.name}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}><span style={{display:"flex",alignItems:"center",gap:7}}><span className="cat-dot" style={{background:c.cor}}/>{c.name}</span><span className="num muted">{fmt(c.value)} · {totalDesp?((c.value/totalDesp)*100).toFixed(0):0}%</span></div><div className="bar-track"><div className="bar-fill" style={{width:(porCat[0]?.value?(c.value/porCat[0].value)*100:0)+"%",background:c.cor}}/></div></div>)}</div>:<Empty icon="filter_list" text="Sem despesas"/>}
      </div>
      <div className="card">
        <div className="sec-title"><I n="trending_up" s={16} c="gold"/> Performance</div><div className="sec-sub">Ranking por rentabilidade</div>
        {perfInv.length?<div style={{display:"flex",flexDirection:"column",gap:2}}>{perfInv.map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid var(--line2)"}}><div><b className={i===0?"gold":""}>{p.nome}</b><div className="muted" style={{fontSize:11.5}}>{fmt(p.valor)}</div></div><span className={"badge "+(p.rent>=0?"pos":"neg")}>{pct(p.rent)}</span></div>)}</div>:<Empty icon="trending_up" text="Sem investimentos"/>}
      </div>
    </div>
  </div>);
}

    else setReady(true);
  },[]);

  if(!ready)return <div className="loader"><div style={{textAlign:"center"}}><div className="spin" style={{margin:"0 auto 14px"}}/>Conectando...</div></div>;

  const props={lancamentos,categorias,contas,compras,fiis,rendaFixa,config};

  return(<div className="shell">
    <aside className={"sidebar"+(open?" open":"")}>
      <div className="brand"><div className="brand-mark"><I n="paid" s={20}/></div><div><div className="serif" style={{fontSize:19,fontWeight:500,lineHeight:1}}>FinanceFlow</div><div className="muted2" style={{fontSize:10.5,letterSpacing:1,textTransform:"uppercase",marginTop:3}}>Wealth OS</div></div></div>
      {NAV.map((n,i)=>n.section?<div key={i} className="nav-sep">{n.section}</div>:<div key={n.id} className={"navitem"+(page===n.id?" active":"")} onClick={()=>{setPage(n.id);setOpen(false)}}><I n={n.icon} s={18}/> {n.label}</div>)}
      <div style={{marginTop:"auto",padding:"14px 10px 0",borderTop:"1px solid var(--line)"}}><div className="muted2" style={{fontSize:11,lineHeight:1.5}}>Firebase · Tempo real · Backup automático</div></div>
    </aside>
    <main className="main">
      <div className="mobile-bar no-print" style={{marginBottom:16,justifyContent:"space-between",alignItems:"center"}}><button className="btn btn-sm" onClick={()=>setOpen(!open)}>☰</button><span className="serif gold" style={{fontSize:17}}>FinanceFlow</span></div>
      {page==="dash"&&<Dashboard {...props}/>}
      {page==="lanc"&&<Lancamentos {...props}/>}
      {page==="cats"&&<Categorias {...props}/>}
      {page==="contas"&&<ContasCartoes {...props}/>}
      {page==="inv"&&<Investimentos {...props}/>}
      {page==="rep"&&<Relatorios {...props}/>}
      {page==="cfg"&&<Config {...props}/>}
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
