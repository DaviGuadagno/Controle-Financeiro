<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FinControl — Dashboard Financeiro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#0f1117;
  --bg2:#161b26;
  --bg3:#1c2333;

  --text:#e8eaf0;
  --muted:#7a8096;

  --border:rgba(255,255,255,.07);

  --accent:#4f7cff;
  --green:#22c55e;
  --red:#f43f5e;
  --amber:#f59e0b;

}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

.shell{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:20px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:30px;
}

.brand-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,#4f7cff,#7b5cfa);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.brand-title{
  font-size:18px;
  font-weight:700;
}

.brand-sub{
  font-size:12px;
  color:var(--muted);
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav-item{
  padding:14px;
  border-radius:14px;
  text-decoration:none;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:10px;
  transition:.2s;
}

.nav-item:hover{
  background:rgba(255,255,255,.04);
  color:white;
}

.nav-item.active{
  background:rgba(79,124,255,.15);
  color:var(--accent);
}

/* MAIN */

.main{
  padding:28px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
  flex-wrap:wrap;
  gap:20px;
}

.title{
  font-size:28px;
  font-weight:700;
}

.subtitle{
  color:var(--muted);
  margin-top:6px;
}

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

.btn{
  background:var(--bg2);
  border:1px solid var(--border);
  color:white;
  padding:12px 18px;
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
  font-weight:600;
}

.btn:hover{
  background:var(--bg3);
}

.btn-success{
  background:rgba(34,197,94,.15);
  color:#7dffab;
}

.btn-danger{
  background:rgba(244,63,94,.15);
  color:#ff8fa2;
}

.select-month{
  background:var(--bg2);
  border:1px solid var(--border);
  color:white;
  padding:12px 18px;
  border-radius:14px;
  outline:none;
  font-weight:600;
}

/* METRICS */

.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:20px;
}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
}

.metric-title{
  color:var(--muted);
  font-size:13px;
  margin-bottom:12px;
}

.metric-value{
  font-size:24px;
  font-weight:700;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

.card-title{
  font-size:18px;
  margin-bottom:20px;
}

/* TRANSACTIONS */

.transactions{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.transaction{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--bg3);
  padding:14px;
  border-radius:14px;
  color:#dbe1ff;
}

.transaction-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.transaction-icon{
  width:42px;
  height:42px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  justify-content:center;
}

.transaction-name{
  font-weight:600;
}

.transaction-date{
  font-size:12px;
  color:var(--muted);
}

.pos{
  color:var(--green);
  font-weight:700;
}

.neg{
  color:var(--red);
  font-weight:700;
}

/* RESPONSIVO */

@media(max-width:1000px){

.metrics{
  grid-template-columns:1fr 1fr;
}

.grid{
  grid-template-columns:1fr;
}

}

@media(max-width:700px){

.shell{
  grid-template-columns:1fr;
}

.sidebar{
  display:none;
}

.metrics{
  grid-template-columns:1fr;
}

.main{
  padding:16px;
}

}

</style>
</head>

<body>

<div class="shell">

<!-- SIDEBAR -->

<div class="brand">

</a>

<!-- MAIN -->

<main class="main" id="mainContent"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script type="module">

// ==========================================

// ==========================================
// CONFIG FIREBASE
// ==========================================

const firebaseConfig = {

apiKey: "SUA_API_KEY",

authDomain: "SEU_PROJETO.firebaseapp.com",

projectId: "SEU_PROJECT_ID",

storageBucket: "SEU_PROJETO.appspot.com",

// ==========================================
// FORMATADOR
// ==========================================

return value.toLocaleString("pt-BR",{

// ==========================================
// DASHBOARD HTML
// ==========================================

</div>

`;

// ==========================================
// SECTIONS
// ==========================================

const sections = {

dashboard: dashboardHTML,

lancamentos: `

<div class="topbar">

<div>

<div class="title">
Lançamentos
</div>

<div class="subtitle">
Área de movimentações financeiras
</div>

</div>

</div>

<div class="grid">

<div class="card">

<div class="card-title">
Filtros
</div>

<div class="transactions">

<div class="transaction">Categoria</div>
<div class="transaction">Data</div>
<div class="transaction">Conta</div>
<div class="transaction">Cartão</div>
<div class="transaction">Tipo</div>
<div class="transaction">Busca por descrição</div>

</div>

</div>

<div class="card">

<div class="card-title">
Cadastro de Lançamento
</div>

<div class="transactions">

<div class="transaction">Valor</div>
<div class="transaction">Descrição</div>
<div class="transaction">Categoria</div>
<div class="transaction">Data</div>
<div class="transaction">Conta / Cartão</div>
<div class="transaction">Parcelado</div>
<div class="transaction">Recorrente</div>
<div class="transaction">Observações</div>
<div class="transaction">Anexo / Comprovante</div>

</div>

</div>

</div>

<div class="metrics">

<div class="card">

<div class="metric-title">
Organização
</div>

<div class="metric-value">
Dia / Semana / Mês
</div>

</div>

<div class="card">

<div class="metric-title">
Importação
</div>

<div class="metric-value">
CSV / OFX
</div>

</div>

<div class="card">

<div class="metric-title">
OCR
</div>

<div class="metric-value">
Ativo
</div>

</div>

<div class="card">

<div class="metric-title">
Geolocalização
</div>

<div class="metric-value">
Ativa
</div>

</div>

</div>

`,

cartoes: `

<div class="topbar">

<div>

<div class="title">
Cartões
</div>

<div class="subtitle">
Gestão de cartões de crédito
</div>

</div>

</div>

<div class="metrics">

<div class="card">

<div class="metric-title">
Limite Total
</div>

<div class="metric-value">
R$ 0,00

</div>

<div class="card">

</div>

<div class="card">

<div class="metric-title">

</div>

</div>

</div>

<div class="grid">

<div class="card">

<div class="card-title">
Cadastro de Cartão
</div>

<div class="transactions">

<div class="transaction">Nome</div>

</div>

<div class="card">

Extras
</div>

`,

metas: `

<div class="topbar">

<div>

<div class="title">

</div>

</div>

</div>

</div>

<div class="metrics">

<div class="metric-title">

</div>

<div class="metric-value">

configuracoes: `

<div class="topbar">

<div>

</div>

</div>

</div>

<div class="grid">

<div class="card">

Conta
</div>

<div class="transactions">

<div class="transaction">Foto</div>

<div class="transaction">Senha</div>

<div class="card">

Financeiro
</div>

</div>

</div>

<div class="grid">

<div class="card">

Segurança
</div>

<div class="transactions">

</div>

};

// ==========================================
// MENU
// ==========================================

const navItems =
document.querySelectorAll(".nav-item");

navItems.forEach(item=>{

item.addEventListener("click",(e)=>{

e.preventDefault();

navItems.forEach(i=>
i.classList.remove("active")
);

item.classList.add("active");

const section =
item.dataset.section;

loadSection(section);

});

});

// ==========================================
// LOAD SECTION
// ==========================================

function loadSection(section){

main.innerHTML =
sections[section];

if(section === "dashboard"){

document.getElementById("monthSelector").value =
mesSelecionado;

initMonthSelector();
initButtons();
initChart();
updateDashboard();

}

}

// ==========================================
// MONTH SELECTOR
// ==========================================

function initMonthSelector(){

const selector =
document.getElementById("monthSelector");

selector.addEventListener("change",()=>{

mesSelecionado =
Number(selector.value);

updateDashboard();

});

}

// ==========================================
// FIREBASE SAVE
// ==========================================

async function salvarLancamento(
tipo,
nome,
valor,
data
){

const mes =
Number(data.split("/")[1]);

await addDoc(collection(db,"lancamentos"),{

tipo,
nome,
valor,
data,
mes,
createdAt:serverTimestamp()

});

}

// ==========================================
// FIREBASE LOAD
// ==========================================

async function carregarLancamentos(){

receitas = [];
despesas = [];

const querySnapshot =
await getDocs(collection(db,"lancamentos"));

querySnapshot.forEach((doc)=>{

const item = doc.data();

if(item.tipo === "receita"){

receitas.push(item);

}else{

despesas.push(item);

}

});

updateDashboard();

}

// ==========================================
// UPDATE DASHBOARD
// ==========================================

function updateDashboard(){

if(!document.getElementById("receitaTotal"))
return;

const receitasMes =
receitas.filter(r=>r.mes === mesSelecionado);

const despesasMes =
despesas.filter(d=>d.mes === mesSelecionado);

const totalReceitas =
receitasMes.reduce((a,b)=>a+b.valor,0);

const totalDespesas =
despesasMes.reduce((a,b)=>a+b.valor,0);

const saldo =
totalReceitas - totalDespesas;

document.getElementById("receitaTotal").innerText =
money(totalReceitas);

document.getElementById("despesaTotal").innerText =
money(totalDespesas);

document.getElementById("saldoTotal").innerText =
money(saldo);

document.getElementById("totalLancamentos").innerText =
receitasMes.length + despesasMes.length;

renderTransactions(
receitasMes,
despesasMes
);

updateChart(
totalReceitas,
totalDespesas
);

}

// ==========================================
// TRANSACTIONS
// ==========================================

function renderTransactions(
receitasMes,
despesasMes
){

const container =
document.getElementById("transactionsList");

if(!container) return;

const all = [

...receitasMes.map(r=>({...r,tipo:"receita"})),
...despesasMes.map(d=>({...d,tipo:"despesa"}))

];

if(all.length === 0){

container.innerHTML = `
<div style="color:var(--muted)">
Nenhum lançamento neste mês
</div>
`;

return;

}

container.innerHTML = "";

all.reverse().forEach(item=>{

container.innerHTML += `

<div class="transaction">

<div class="transaction-left">

<div class="transaction-icon">

<i class="ti ${item.tipo === "receita"

? "ti-arrow-up"

: "ti-arrow-down"}"></i>

</div>

<div>

<div class="transaction-name">
${item.nome}
</div>

<div class="transaction-date">
${item.data}
</div>

</div>

</div>

<div class="${item.tipo === "receita"

? "pos"

: "neg"}">

${item.tipo === "receita" ? "+" : "-"}

${money(item.valor)}

</div>

</div>

`;

});

}

// ==========================================
// BUTTONS
// ==========================================

function initButtons(){

const receitaBtn =
document.getElementById("addReceita");

const despesaBtn =
document.getElementById("addDespesa");

receitaBtn.addEventListener("click",async()=>{

const nome =
prompt("Nome da receita:");

if(!nome) return;

const valor =
Number(prompt("Valor da receita:"));

if(!valor) return;

const dataInput =
prompt(
"Data da receita (dd/mm/aaaa):",
new Date().toLocaleDateString("pt-BR")
);

if(!dataInput) return;

await salvarLancamento(
"receita",
nome,
valor,
dataInput
);

await carregarLancamentos();

});

despesaBtn.addEventListener("click",async()=>{

const nome =
prompt("Nome da despesa:");

if(!nome) return;

const valor =
Number(prompt("Valor da despesa:"));

if(!valor) return;

const dataInput =
prompt(
"Data da despesa (dd/mm/aaaa):",
new Date().toLocaleDateString("pt-BR")
);

if(!dataInput) return;

await salvarLancamento(
"despesa",
nome,
valor,
dataInput
);

await carregarLancamentos();

});

}

// ==========================================
// CHART
// ==========================================

function initChart(){

const canvas =
document.getElementById("financeChart");

if(!canvas) return;

const ctx =
canvas.getContext("2d");

financeChart = new Chart(ctx, {

type:"bar",

data:{

labels:[
"Receitas",
"Despesas"
],

datasets:[{

data:[0,0]

}]

},

options:{

responsive:true,

plugins:{
legend:{
display:false
}
},

scales:{

x:{
ticks:{
color:"#7a8096"
},
grid:{
color:"rgba(255,255,255,.05)"
}
},

y:{
ticks:{
color:"#7a8096"
},
grid:{
color:"rgba(255,255,255,.05)"
}
}

}

}

});

}

// ==========================================
// UPDATE CHART
// ==========================================

function updateChart(
receitas,
despesas
){

if(!financeChart) return;

financeChart.data.datasets[0].data = [
receitas,
despesas
];

financeChart.update();

}

// ==========================================
// INIT
// ==========================================

loadSection("dashboard");

carregarLancamentos();

</script>

</body>
</html>
